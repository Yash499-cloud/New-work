name: Recovery-Builder-Shell

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Start SSH Shell (Singapore Server)
        uses: mxschmitt/action-tmate@v3
        with:
          # Isse false karne par GitHub profile ki key check nahi hogi
          limit-access-to-actor: false
          tmate-server-host: sgp1.tmate.io
          

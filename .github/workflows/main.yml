name: SSH Terminal Build (Free)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH & Serveo
        run: |
          # Password set kar rahe hain '123'
          echo "runner:123" | sudo chpasswd
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo service ssh restart

          echo "--- SSH CONNECTION DETAILS ---"
          # Serveo se tunnel create karna
          ssh -o StrictHostKeyChecking=no -R 80:localhost:22 serveo.net 2>&1 | grep -o 'forwarded from .*' || true &
          
          # Address nikalne ke liye thoda wait aur loop
          sleep 10
          echo "Connect using this command in Termux:"
          echo "ssh runner@serveo.net -p 80"
          echo "------------------------------"

      - name: Keep Alive
        run: sleep 21600
        
